<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Art[hur]</title>
  <style>
    body {
      margin: 0;
      padding: 2rem 1.5rem 3rem;
      font-family: Georgia, "Times New Roman", serif;
      color: #222;
      background: #f9f9f6;
      line-height: 1.5;
    }
    header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #ddd;
      max-width: 40em;
    }
    h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.75rem;
      font-weight: normal;
      color: #4b2e6a;
    }
    nav { font-size: 0.95rem; }
    nav a { color: #6b4c7a; }
    main { max-width: 56rem; }
    figure { margin: 0 0 2rem; }
    img { max-width: 100%; height: auto; display: block; }
    figcaption { margin-top: 0.5rem; color: #555; font-size: 0.95rem; }
  </style>
</head>
<body>
  <header>
    <h1>Art[hur]</h1>
  </header>
  <main>
    <figure>
      <img src="hospital.jpg" alt="hospital">
    </figure>
    <figure>
      <img src="legup.jpg" alt="legup">
    </figure>
    <figure>
      <img src="oldphasereyes.jpg" alt="oldphasereyes">
    </figure>
    <figure>
      <img src="portrait.jpg" alt="portrait">
    </figure>
    <figure>
      <img src="shrimp.jpg" alt="shrimp">
    </figure>
    <figure>
      <img src="sleep.jpg" alt="sleep">
    </figure>
  </main>
</body>
</html>
